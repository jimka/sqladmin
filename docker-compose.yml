# SQLAdmin local stack: a seeded Postgres plus the all-in-one app image
# (API + built frontend, see the root Dockerfile).
#
# This is a demo and development stack, not a deployment template. It bundles
# a throwaway database seeded from db/init/, with credentials written in plain
# text below and port 5432 published to the host. Do not point it at data you
# care about, and do not adapt it by swapping the image tag alone.
#
# Deploying SQLAdmin for real means, at minimum:
#   - Drop the `db` service. Run your own database, and do not publish its port.
#   - Set SQLADMIN_ALLOWED_HOSTS to that database instead of the demo one.
#   - Supply credentials from a secret store, not from this file.
#   - Terminate TLS at a reverse proxy in front of the app, and set
#     FORWARDED_ALLOW_IPS to the proxy's address so the session cookie is
#     marked Secure and rate limiting keys on the real client.
#   - Run one replica. The session registry and the login rate limiter are
#     both per process, so a second replica silently weakens each.
#
# See the "Status and intended use" and "Configuration" sections of README.md.
services:
  db:
    image: postgres:16-alpine
    container_name: sqladmin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sqladmin
      POSTGRES_PASSWORD: sqladmin
      POSTGRES_DB: sqladmin
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      # Seed scripts run once, only when the data volume is first created.
      # Re-seed with: docker compose down -v && docker compose up -d db
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqladmin -d sqladmin"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:                             # all-in-one: API + built frontend
    # `build` and `image` together: `docker compose up --build` builds from
    # this tree and tags it; `docker compose pull` fetches the published one.
    build:
      context: .
    image: ghcr.io/jimka/sqladmin:0.1.0
    container_name: sqladmin-app
    restart: unless-stopped
    environment:
      # The backend dials the host each login supplies, guarded by a default-deny
      # allowlist — so it must name the db. On the compose network the db is
      # reachable by its service name (`db`) and its container name
      # (`sqladmin-db`); allow both on 5432. From inside this container
      # `localhost` is the backend itself, not the db, so it is intentionally not
      # listed — log in against `sqladmin-db` (or `db`), not `localhost`.
      SQLADMIN_ALLOWED_HOSTS: "db:5432,sqladmin-db:5432"
      # A ready-made login target so the connection dialog offers the local db
      # (credentials are still entered per login — presets carry none).
      SERVER_PRESETS: '[{"name":"Local (docker)","host":"sqladmin-db","port":5432,"database":"sqladmin"}]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
